<div class="buffer-content" id="buffer-{{ name | replace('.', '-') | replace('#', '-') }}">
<div class="code-pane code-pane-desktop">
  <div class="pane-label">{{ name }}</div>
  <pre class="code-scroll">{{ career_code }}</pre>
</div>
<div class="preview-pane">
  <h1>Career Timeline</h1>
  <ul class="timeline">
    {% for item in career_items %}
    <li>
      <span class="commit-type {{ item.type }}">{{ item.type }}</span>
      <span>{{ item.text }}</span>
      {% if item.date %}
      <small>{{ p.name }} · {{ item.date }}</small>
      {% endif %}
    </li>
    {% endfor %}
  </ul>
</div>
</div>
