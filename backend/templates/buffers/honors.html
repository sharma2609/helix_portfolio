<div class="buffer-content" id="buffer-{{ name | replace('.', '-') | replace('#', '-') }}">
<div class="code-pane code-pane-desktop">
  <div class="pane-label">{{ name }}</div>
  <pre class="code-scroll">{{ honors_code }}</pre>
</div>
<div class="preview-pane">
  <h1>Honors &amp; Awards</h1>
  <ul class="timeline">
    {% for item in honors %}
    <li>
      <span class="commit-type achievement">honor</span>
      <span>{{ item }}</span>
    </li>
    {% endfor %}
  </ul>
</div>
</div>
