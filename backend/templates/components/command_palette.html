<div class="palette-overlay hidden" id="palette-overlay">
  <div class="palette command-menu-shell" role="dialog" aria-label="Command menu">
    <div class="command-menu modal">
      <div class="command-menu-search">
        <input
          id="palette-search"
          class="command-menu-input"
          placeholder="Jump to file or search portfolio…"
          aria-label="Command menu search"
          data-palette-search
        />
        <button type="button" class="command-menu-close" data-palette-close aria-label="Close">Esc</button>
      </div>
      <div class="command-menu-body" id="palette-body">
        {% include 'components/command_menu_default.html' %}
      </div>
    </div>
  </div>
</div>

<template id="palette-default-content">
  {% include 'components/command_menu_default.html' %}
</template>
