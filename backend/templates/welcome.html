<div class="welcome-pane">
  <div class="welcome-hero" aria-hidden="true">PS</div>
  <p class="welcome-location">{{ p.location }}</p>
  <h1>{{ p.name }}</h1>
  <h2>{{ p.role }}</h2>
  <p class="welcome-desc">
    AI/ML developer building practical systems. Press <kbd>Ctrl+P</kbd> for the
    command menu or open the assistant below.
  </p>
  <div class="welcome-grid">
    <button type="button" class="welcome-card" data-file="home.jsx">Home</button>
    <button type="button" class="welcome-card" data-file="about.md">About</button>
    <button type="button" class="welcome-card" data-file="skills.md">Skills</button>
    <button type="button" class="welcome-card" data-file="experience.md">Experience</button>
    <button type="button" class="welcome-card" data-file="education.md">Education</button>
    <button type="button" class="welcome-card" data-file="certifications.md">Certifications</button>
    <button type="button" class="welcome-card" data-file="honors.md">Honors</button>
    <button type="button" class="welcome-card" data-file="projects.js">Projects</button>
    <button type="button" class="welcome-card" data-file="contact.html">Contacts</button>
    <button type="button" class="welcome-card" data-file="resume.pdf">Resume</button>
  </div>
</div>
